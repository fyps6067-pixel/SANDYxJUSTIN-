<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galery | SANDYxJUSTIN</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#fff;
    font-family:Arial, sans-serif;
}

header{
    padding:35px;
    text-align:center;
    background:linear-gradient(90deg,#000,#111,#000);
    border-bottom:2px solid #00ffee;
}

header h1{
    font-family:'UnifrakturCook',cursive;
    font-size:45px;
    color:#00ffee;
    text-shadow:0 0 20px #00ffee;
}

header p{
    margin-top:10px;
    color:#bbb;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h2{
    font-family:'UnifrakturCook',cursive;
    color:#00ffee;
    margin-bottom:10px;
}

.gallery{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:15px;
    border:2px solid #00ffee;
    transition:.4s;
    box-shadow:0 0 15px #00ffee55;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #00ffee;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>SANDYxJUSTIN 🤖</h1>
<p>Dark Gothic Gallery</p>
</header>

<section class="hero">
<h2>WELCOME TO JUSTIN GALLERY</h2>
<p>Dark • Gothic • Robot Theme</p>
</section>

<section class="gallery">
<img src="photo1.jpg" alt="Photo 1">
<img src="photo2.jpg" alt="Photo 2">
<img src="photo3.jpg" alt="Photo 3">
</section>

<footer>
© 2026 SANDYxJUSTIN 🤖
</footer>

</body>
  </html>
